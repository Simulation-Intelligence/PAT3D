name: Release Install Verification

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  wheel-smoke-pip:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Run release wheel smoke with pip
        run: |
          bash scripts/test_release_wheel_install.sh --installer pip --python python

  wheel-smoke-uv:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Run release wheel smoke with uv
        run: |
          bash scripts/test_release_wheel_install.sh --installer uv --python python

  clean-install-e2e-smoke:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Run clean install end-to-end smoke pipeline
        run: |
          bash scripts/test_release_e2e_smoke.sh --python python

  bundle-install-with-private-physics:
    if: ${{ secrets.PAT3D_PRIVATE_PHYSICS_WHEEL_URL != '' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Download private physics wheel
        env:
          PAT3D_PRIVATE_PHYSICS_WHEEL_URL: ${{ secrets.PAT3D_PRIVATE_PHYSICS_WHEEL_URL }}
        run: |
          curl -fsSL "${PAT3D_PRIVATE_PHYSICS_WHEEL_URL}" -o "${RUNNER_TEMP}/private-physics.whl"

      - name: Run Docker + micromamba bundle install gate
        env:
          PAT3D_PRIVATE_PHYSICS_WHEEL: ${{ runner.temp }}/private-physics.whl
        run: |
          bash scripts/test_release_bundle_install.sh --python python --private-physics-wheel "${PAT3D_PRIVATE_PHYSICS_WHEEL}"
