name: Environment Setup Verification

on:
  push:
  pull_request:

jobs:
  bootstrap-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Build PAT3D development image
        run: docker build -f docker/Dockerfile -t pat3d-dev .

      - name: Verify repository setup inside image
        run: |
          docker run --rm \
            -e OPENAI_API_KEY=ci-test-key \
            pat3d-dev \
            python scripts/check_prereqs.py

      - name: Run setup-focused unit tests inside image
        run: |
          docker run --rm \
            -e OPENAI_API_KEY=ci-test-key \
            pat3d-dev \
            python -m unittest discover -s tests -p 'test_check_prereqs.py'
